name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.4.1"

      - name: Install dependencies
        run: poetry install --only main,build,windows-build --no-root

      - name: Create env file
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build Windows app
        run: poetry run flet pack main.py --add-data "assets:assets" --add-data "locales:locales" --add-data ".env:." --icon assets/icon_windows.png --name WayfairFlatMakerByDK --yes

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayfairFlatMakerByDK-windows
          path: dist/
          retention-days: 14

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      - name: Setup Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.4.1"

      - name: Install dependencies
        run: poetry install --only main,build --no-root

      - name: Create env file
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build macOS app
        run: poetry run flet build --verbose --yes --no-rich-output --skip-flutter-doctor macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayfairFlatMakerByDK-macos
          path: build/macos/
          retention-days: 14
