name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --without dev

      - name: Build Windows app
        run: poetry run flet pack main.py --add-data "assets:assets" --add-data "locales:locales" --icon assets/icon_windows.png --name WayfairFlatMakerByDK

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayfairFlatMakerByDK-windows
          path: dist/
          retention-days: 14

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --without dev

      - name: Build macOS app
        run: poetry run flet build macos --verbose --yes

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WayfairFlatMakerByDK-macos
          path: build/macos/
          retention-days: 14
